<text x="92" y="383" font-family="Verdana, DejaVu Sans, Arial, sans-serif" font-size="16" fill="#7c2d12" font-weight="650" text-anchor="start">Lumina vence overall por +0.0337, agora com 26/34 tracks e 5/6 assays contra NTv3 8M pre.</text>
<text x="92" y="408" font-family="Verdana, DejaVu Sans, Arial, sans-serif" font-size="16" fill="#7c2d12" font-weight="650" text-anchor="start">Contra NTv3 100M pre, a margem é só +0.0016; isso é uma pista técnica, não claim oficial sem 3 seeds.</text>
<text x="92" y="431" font-family="Verdana, DejaVu Sans, Arial, sans-serif" font-size="15" fill="#7c2d12" font-weight="650" text-anchor="start">PRO-cap contribui +0.0284 no overall; context-pyramid reduziu parte das perdas em RNA/ATAC/Histone.</text>
<text x="70" y="490" font-family="Verdana, DejaVu Sans, Arial, sans-serif" font-size="24" fill="#0f172a" font-weight="850" text-anchor="start">O que mudou neste resultado</text>

<text x="88" y="597" font-family="Verdana, DejaVu Sans, Arial, sans-serif" font-size="13" fill="#475569" font-weight="600" text-anchor="start">embedding global da janela + convoluções dilatadas sem gate.</text>
