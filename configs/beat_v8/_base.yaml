# Beat-v8: v7 backbone plus leak-free allele-directed pretraining.
fasta_path: data/hg38/hg38.fa
phylo100_bw_path: data/phylo/hg38.phyloP100way.bw
phylo470_bw_path: data/phylo/hg38.phyloP470way.bw
gtf_path: data/gencode/gencode.v38.annotation.gtf.gz
chromosome_split_mode: full_hg38

model: beat-v8
model_config:
  d_model: 256
  n_layers: 8
  d_state: 128
  expand: 2
  headdim: 64
  ngroups: 1
  rope_fraction: 1.0
  chunk_size: 64
  is_mimo: false
  mimo_rank: 4
  is_outproj_norm: true
  dropout: 0.05
  use_gated_fusion: true
  num_aa_classes: 22
  num_encode_tracks: 0
  # Non-reentrant checkpointing trips the CUDA Mamba3 Triton backward saved-tensor guard.
  activation_checkpointing: false
  checkpoint_use_reentrant: false
  attention_every_n_blocks: 3
  attention_window: 256
  attention_n_heads: 4
  allele_context_radius: 64

seq_len: 4096
batch_size: 8
num_workers: 6
prefetch_factor: 4
mask_prob: 0.20
mean_span_len: 6

lr: 0.0008
lr_scheduler: cosine
min_lr: 0.00008
weight_decay: 0.1
beta1: 0.9
beta2: 0.95
grad_clip: 1.0
warmup_steps: 384

max_steps: 3840
eval_every: 512
save_every: 2048
log_every: 100
max_checkpoints_to_keep: 3

loss_balancing: uncertainty
w_rc: 0.05
w_region: 0.25
w_aa: 0.25
w_codon_phylo: 0.1
w_mutation_effect: 0.05
w_counterfactual: 0.10
w_allele: 0.35
w_codon: 0.15
w_encode: 0.0
lambda_mutation_effect_rank: 0.25
lambda_allele_rank: 0.5
lambda_allele_severity: 1.0
lambda_allele_swap: 0.25
lambda_allele_far: 0.1
counterfactual_weighting: fixed
counterfactual_local_similarity_target: 0.8
splice_class_weight_cap: 5.0
region_class_weight_cap: 8.0
aa_class_weight_cap: 5.0

uncertainty_init_log_sigma:
  mlm: 0.0
  phylo100: -0.5
  phylo470: -0.5
  structure: 0.0
  region: 0.5
  aa: 0.5
  codon_phylo: 0.0
  mutation_effect: 0.5
  allele: 0.0
  codon: 0.0
  encode: 0.0

phylo_weighted_mlm: true
phylo_mlm_boost: 2.0
conservation_mix: 0.65
cds_enrichment_fraction: 0.35
splice_window_oversample_fraction: 0.12
hard_position_mix: 0.25
hard_position_ema_decay: 0.99
hard_position_warmup_steps: 500
counterfactual_fraction: 0.20
allele_fraction: 0.50
allele_score_window: 4096
allele_max_rows_per_batch: 2
allele_rank_every_n_steps: 4
auxiliary_schedule: alternate_allele_counterfactual
clinvar_blocklist_bed_path: data/clinvar/blocklist_v1.bed
aux_loss_warmup_steps: 1000

curriculum:
  enabled: true
  exon_centric_fraction: 0.20
  counterfactual_warmup_fraction: 0.05

encode_track_specs: []

param_budget:
  backbone_max_params: 30000000
  total_target_params: 30000000
  backbone_target_params: 12000000
  headroom_sources:
    - allele_scorer_head
    - local_attention_layers
    - encode_track_head
  note: "v8 isolates allele-directed supervision before any width/depth scale-up."

seed: 42
precision: auto
allow_tf32: true
memory_preflight_enabled: true

wandb_enabled: true
wandb_project: lumina-ssm
wandb_entity: ai4bio-lumina
