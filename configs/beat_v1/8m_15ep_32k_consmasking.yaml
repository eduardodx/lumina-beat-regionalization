# 8M Beat-v1, 15 epochs, 32k context, conservation-weighted masking.
# Inherits all defaults from _base.yaml.
# Micro-batch=1 × accum=8 → effective batch=8 per device (262,144 tokens/step/device).
# 8xA100: 2,097,152 tokens/step global. 1 epoch ~ 480 steps.

_inherit: _base.yaml

seq_len: 32768
batch_size: 2
grad_accum_steps: 4

max_steps: 7200
eval_every: 240
save_every: 480

conservation_mix: 0.5

output_dir: outputs/lumina_8m_beat_v1_15ep_32k_consmasking
wandb_run_name: beat-v1-8m-15ep-32k-consmasking
