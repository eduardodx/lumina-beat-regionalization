# 8M BiMamba3-RC, 5 epochs, conservation-weighted masking.
# Inherits all defaults from _base.yaml (1-epoch = 3,840 steps).
# Biases 50% of span starts toward high-PhyloP100 positions.

_inherit: _base.yaml

max_steps: 19200
eval_every: 1024
save_every: 3840

conservation_mix: 0.5

output_dir: outputs/lumina_8m_bimamba3_rc_5ep_consmasking
wandb_run_name: bimamba3-rc-8m-5ep-consmasking
