# Beat-v6: v4 backbone + deeper (10 layers), phylo-weighted MLM, CDS enrichment,
# auxiliary loss warmup, GradNorm balancing, and pooled embedding for RC loss.
fasta_path: data/hg38/hg38.fa
phylo100_bw_path: data/phylo/hg38.phyloP100way.bw
phylo470_bw_path: data/phylo/hg38.phyloP470way.bw
gtf_path: data/gencode/gencode.v38.annotation.gtf.gz
chromosome_split_mode: full_hg38

model: beat-v6
model_config:
  d_model: 256
  n_layers: 10
  d_state: 64
  expand: 2
  headdim: 64
  ngroups: 1
  rope_fraction: 1.0
  chunk_size: 64
  is_mimo: false
  mimo_rank: 4
  is_outproj_norm: true
  dropout: 0.05
  use_gated_fusion: true
  num_aa_classes: 22
  activation_checkpointing: true

seq_len: 4096
batch_size: 8
num_workers: 6
prefetch_factor: 4
mask_prob: 0.20
mean_span_len: 6

lr: 0.0008
lr_scheduler: cosine
min_lr: 0.00008
weight_decay: 0.1
beta1: 0.9
beta2: 0.95
grad_clip: 1.0
warmup_steps: 384

max_steps: 3840
eval_every: 512
save_every: 2048
log_every: 100
max_checkpoints_to_keep: 3

loss_balancing: gradnorm
w_rc: 0.05
w_region: 0.25
w_aa: 0.25
w_codon_phylo: 0.1
w_mutation_effect: 0.15

phylo_weighted_mlm: true
phylo_mlm_boost: 2.0
conservation_mix: 0.5
cds_enrichment_fraction: 0.3
aux_loss_warmup_steps: 500

seed: 42
precision: auto
allow_tf32: true
memory_preflight_enabled: true

wandb_enabled: true
wandb_project: lumina-ssm
wandb_entity: ai4bio-lumina
